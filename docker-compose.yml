version: "3.8"

services:
  getprodi:
    build: .
    container_name: getprodi
    restart: unless-stopped
    ports:
      - "80:3000"
    env_file:
      - .env.production
    volumes:
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
