version: "3.8"

services:
  aiproducer:
    build: .
    container_name: aiproducer
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    volumes:
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
